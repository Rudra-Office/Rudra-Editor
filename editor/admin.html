
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rudra Office Admin</title>
  <link rel="icon" type="image/svg+xml" href="/icon-192.svg">
  <link rel="stylesheet" href="/src/admin/styles.css">
</head>
<body>
  <div class="header">
    <h1>Rudra Office Admin</h1>
    <span id="ver"></span>
    <div class="refresh-bar">
      <span id="lastUpdate"></span>
      <button id="refreshBtn" title="Refresh now">Refresh</button>
      <button id="pauseBtn" title="Pause auto-refresh">Pause</button>
    </div>
    <a href="/admin/logout" class="logout">Logout</a>
  </div>
  <div class="container">
    <div class="cards" id="cards"></div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-tab="sessions">Sessions</div>
      <div class="tab" data-tab="errors">Errors</div>
      <div class="tab" data-tab="health">Health</div>
      <div class="tab" data-tab="config">Config</div>
    </div>
    <div class="tab-panel active" id="panel-sessions">
      <div class="table-wrap">
        <table>
          <thead><tr><th>ID</th><th>File</th><th>Fmt</th><th>Size</th><th>Editors</th><th>Last Active</th><th>Status</th><th>Age</th><th>Actions</th></tr></thead>
          <tbody id="sessions"></tbody>
        </table>
      </div>
    </div>
    <div class="tab-panel" id="panel-errors">
      <div id="errorsContent"></div>
    </div>
    <div class="tab-panel" id="panel-health">
      <div id="healthContent"></div>
    </div>
    <div class="tab-panel" id="panel-config">
      <pre id="config"></pre>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script type="module" src="/src/admin/main.js"></script>
</body>
</html>
