services:
  # Unified rudra-server: serves editor UI + REST API + WebSocket collab
  # Single container, single port, single binary
  s1-server:
    build:
      context: .
      dockerfile: Dockerfile.unified
    ports:
      - "${S1_PORT:-8080}:8080"
    environment:
      - S1_PORT=8080
      - S1_STORAGE=${S1_STORAGE:-local}
      - S1_DATA_DIR=/data
      - S1_STATIC_DIR=/app/public
      - S1_AUTH_ENABLED=${S1_AUTH_ENABLED:-true}
      - S1_JWT_SECRET=${S1_JWT_SECRET:?Set S1_JWT_SECRET for production}
      - S1_ALLOW_ANONYMOUS=${S1_ALLOW_ANONYMOUS:-false}
      - S1_ADMIN_USER=${S1_ADMIN_USER:?Set S1_ADMIN_USER}
      - S1_ADMIN_PASS=${S1_ADMIN_PASS:?Set S1_ADMIN_PASS}
      - RUST_LOG=${RUST_LOG:-s1_server=info,tower_http=info}
    volumes:
      - s1-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # AI Sidecar — CPU-optimized LLM (Qwen2.5-3B via llama.cpp)
  # Provides writing assist, grammar check, formula help, translation
  rudra-ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    ports:
      - "${AI_PORT:-8081}:8081"
    volumes:
      - ai-models:/models
    deploy:
      resources:
        limits:
          cpus: "${AI_CPUS:-2}"
          memory: "${AI_MEMORY:-2G}"
        reservations:
          memory: "2G"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  s1-data:
  ai-models:
