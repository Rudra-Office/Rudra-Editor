<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>DOCY Test Harness</title>
<style>
body{font-family:monospace;margin:20px}
#editor_sdk{width:800px;height:400px;border:1px solid #ccc;margin:10px 0}
button{padding:8px 16px;margin:4px;cursor:pointer}
#log{background:#111;color:#0f0;padding:10px;height:300px;overflow:auto;white-space:pre;font-size:12px}
</style>
</head><body>
<h3>DOCY Binary Test Harness (isolated sdkjs instance)</h3>
<button onclick="testKnownGood()">1. Test getEmpty()</button>
<button onclick="testWasmDocy()">2. Test WASM DOCY</button>
<button onclick="reloadEditor()">Reset Editor</button>
<div id="editor_sdk" tabindex="-1"></div>
<div id="log"></div>

<script>window['AscNotLoadAllScript']=true;</script>
<script src="onlyoffice-sdkjs/vendor/polyfill.js"></script>
<script src="onlyoffice-web-apps/vendor/jquery/jquery.min.js"></script>
<script src="onlyoffice-web-apps/vendor/xregexp/xregexp-all-min.js"></script>
<script>var sdk_scripts=[];</script>
<script src="onlyoffice-sdkjs/develop/sdkjs/word/scripts.js"></script>
<script>
sdk_scripts.map(function(s){return s.replace('../../../../sdkjs/','onlyoffice-sdkjs/')}).forEach(function(src){document.write('<script src="'+src+'"><\/script>')});
document.write('<script src="onlyoffice-sdkjs/word/document/editor.js"><\/script>');
</script>
<script>
var _api = null;
var _log = document.getElementById('log');
function log(msg){_log.textContent+=msg+'\n';_log.scrollTop=_log.scrollHeight;console.log('[docy-test]',msg)}

function initEditor(cb) {
    log('Initializing editor...');
    // Font patches
    var orig = AscFonts.g_fontApplication.GetFontFileWeb;
    AscFonts.g_fontApplication.GetFontFileWeb = function(name) {
        var idx = AscFonts.g_map_font_index[name];
        if (idx !== undefined) return {m_wsFontName:name,m_wsFontPath:'',m_lIndex:0};
        idx = AscFonts.g_map_font_index['Arial'];
        if (idx !== undefined) return {m_wsFontName:'Arial',m_wsFontPath:'',m_lIndex:0};
        return orig.call(this, name);
    };
    // Signature fix
    var origOpen = Asc.asc_docs_api.prototype.openDocument;
    Asc.asc_docs_api.prototype.openDocument = function(file) {
        if (file&&file.data&&typeof file.data==='string'&&file.data.indexOf('DOCY')===0) file.bSerFormat=true;
        return origOpen.call(this, file);
    };
    _api = new Asc.asc_docs_api({'id-view':'editor_sdk'});
    window._api = _api;
    _api.CoAuthoringApi.onFirstLoadChangesEnd = function(){_api.asyncServerIdEndLoaded()};
    _api.CoAuthoringApi.onFirstConnect = function(){};
    _api.asc_registerCallback('asc_onDocumentContentReady', function(){
        log('Editor ready');
        if(cb) cb();
    });
    _api.asc_registerCallback('asc_onError', function(id,level){
        if(id!==-25) log('ERROR: id='+id+' level='+level);
    });
    var docInfo = new Asc.asc_CDocInfo();
    docInfo.put_Id('test');docInfo.put_Title('Test');docInfo.put_Format('docx');docInfo.put_OfflineApp(true);
    _api.asc_setDocInfo(docInfo);
    _api.asc_LoadDocument();
}

function reloadEditor() {
    _log.textContent = '';
    document.getElementById('editor_sdk').innerHTML = '';
    initEditor();
}

function testKnownGood() {
    log('=== Test: getEmpty() ===');
    try {
        var docy = AscCommon.getEmpty();
        log('Known good DOCY length: ' + docy.length);
        _api.OpenDocumentFromBin('', docy);
        log('SUCCESS: getEmpty() opened!');
    } catch(e) {
        log('FAILED: ' + e.message);
        log(e.stack.split('\n').slice(0,3).join('\n'));
    }
}

async function testWasmDocy() {
    log('=== Test: WASM DOCY ===');
    try {
        var {default: init, WasmEngine} = await import('./pkg/s1engine_wasm.js');
        await init();
        var engine = new WasmEngine();
        // Simple test doc
        var doc = engine.open_as(new TextEncoder().encode('Hello World\nSecond paragraph'), 'txt');
        var docy = doc.to_docy();
        log('WASM DOCY length: ' + docy.length);

        // Decode and dump first bytes
        var parts = docy.split(';');
        var binary = atob(parts[3]);
        log('Binary size: ' + binary.length + ' Header: ' + parts[0]+';'+parts[1]+';'+parts[2]);
        log('Table count: ' + binary.charCodeAt(0));
        for (var i = 0; i < binary.charCodeAt(0); i++) {
            var pos = 1 + i*5;
            var t = binary.charCodeAt(pos);
            var off = binary.charCodeAt(pos+1)|(binary.charCodeAt(pos+2)<<8)|(binary.charCodeAt(pos+3)<<16)|(binary.charCodeAt(pos+4)<<24);
            var names=['Sig','Info','Media','Num','HdrFtr','Style','Doc','Other','Comments','Settings'];
            log('  Table['+i+']: type='+t+' ('+(names[t]||'?')+') offset='+off);
        }

        log('Attempting OpenDocumentFromBin...');
        _api.OpenDocumentFromBin('', docy);
        log('SUCCESS: WASM DOCY opened!');
    } catch(e) {
        log('FAILED: ' + e.message);
        log(e.stack.split('\n').slice(0,5).join('\n'));
    }
}

window.addEventListener('load', function(){ initEditor(); });
</script>
</body></html>
